<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gym Management System{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; }
        nav { background: #333; color: white; padding: 1rem; }
        nav a { color: white; text-decoration: none; margin: 0 1rem; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 8px; }
        .btn { padding: 0.5rem 1rem; background: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 4px; text-decoration: none; display: inline-block; }
        .btn-danger { background: #f44336; }
        .error { color: red; margin: 1rem 0; }
        .success { color: green; margin: 1rem 0; }
        form { margin: 1rem 0; }
        input, select, textarea { width: 100%; padding: 0.5rem; margin: 0.5rem 0; border: 1px solid #ddd; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { padding: 0.75rem; border: 1px solid #ddd; text-align: left; }
        th { background: #333; color: white; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        {% if request.session.user_type == 'member' %}
            <a href="/user_portal">My Portal</a>
            <a href="/logout">Logout</a>
        {% elif request.session.user_type == 'trainer' %}
            <a href="/trainer_portal">Trainer Portal</a>
            <a href="/logout">Logout</a>
        {% elif request.session.user_type == 'admin' %}
            <a href="/admin_portal">Admin Portal</a>
            <a href="/logout">Logout</a>
        {% endif %}
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
